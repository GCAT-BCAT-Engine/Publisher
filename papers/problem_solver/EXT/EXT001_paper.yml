publisher_document_external_v1:
  title: "StegVerse Cross-Domain Validation: Erd\u0151s Primitive Sets Conjecture\
    \ Analysis via Autonomous Tiered Model Pipeline"
  date: '2026-05-02'
  authors:
  - Rigel Randolph
  - StegVerse Ecosystem
  version: 1.0.0
  abstract: "We demonstrate cross-domain applicability of the StegVerse autonomous\
    \ mathematical problem solving framework through analysis of the Erd\u0151s primitive\
    \ sets conjecture (Problem #1196-class). Using tiered model selection (Haiku classification\
    \ + Sonnet deep analysis with batch API), we generated a rigorous domain classification\
    \ and comprehensive proof strategy analysis for $0.035 \u2014 within the expected\
    \ cost envelope. This validates that the StegVerse pipeline operates effectively\
    \ outside StegVerse-native mathematics, maintaining cost predictability and output\
    \ quality across number-theoretic domains."
  problem_statement:
    source: "Erd\u0151s collection"
    classification: 'Problem #1196-class'
    domain: Analytic Number Theory
    statement: "A primitive set is a set of integers greater than 1 where no element\
      \ divides another. Erd\u0151s conjectured that the sum of 1/(n log n) over all\
      \ n in a primitive set is maximized by the set of prime numbers."
    difficulty: Very High
    status: Unsolved (partial results via Zhang 2019)
  methodology:
    pipeline: Tiered model selection with batch API
    phase_1:
      model: claude-haiku-4-5
      purpose: Domain classification and complexity assessment
      prompt_strategy: Direct classification request
      max_tokens: 1024
    phase_2:
      model: claude-sonnet-4-6
      purpose: Deep analysis and proof strategy
      mechanism: Batch API 50% discount
      prompt_strategy: Direct analysis request with barrier identification
      max_tokens: 4096
  results:
    phase_1:
      cost_usd: 0.0041
      input_tokens: 89
      output_tokens: 802
      total_tokens: 891
      latency_seconds: 2.1
      classification:
        domain: Analytic Number Theory
        subdomain: Multiplicative Number Theory
        difficulty: Very High
        known_results: Zhang's Theorem (2019) proves for sets with ratio condition
        barriers: General case requires new sieve methods
    phase_2:
      cost_usd: 0.0309
      base_cost_usd: 0.0618
      batch_discount: 50.0
      input_tokens: 73
      output_tokens: 4119
      total_tokens: 4192
      latency_seconds: 48.3
      analysis:
        formal_statement: Complete mathematical formalization
        zhang_theorem: Detailed exposition of 2019 partial result
        mertens_heuristic: Probabilistic motivation for conjecture
        primorial_competitors: Alternative constructions challenging primality
        proof_strategy: Multi-step approach with identified gaps
        barriers: Sieve theory limitations, multiplicative structure complexity
    combined:
      total_cost_usd: 0.035
      total_tokens: 5083
      savings_vs_unoptimized: 43.3
      cross_domain_validated: true
  comparison_to_native:
    sv_math_001:
      domain: GCAT/BCAT (StegVerse-native)
      cost: 0.073
      tokens: 11076
      output: Full proof + Lean formalization
      phases: 3
    ext_001:
      domain: "Erd\u0151s primitive sets (external)"
      cost: 0.035
      tokens: 5083
      output: Deep analysis + proof strategy
      phases: 2
    insight: External problems with established partial results (Zhang 2019) require
      less synthesis than StegVerse-native foundational proofs. Cost scales with novelty
      and required synthesis depth.
  critical_lessons:
  - lesson: 'Cross-domain applicability confirmed: pipeline works for number theory'
    evidence: Haiku correctly classified analytic number theory domain
    confidence: High
  - lesson: Established partial results reduce synthesis cost
    evidence: EXT-001 ($0.035) cheaper than SV-MATH-001 ($0.073) due to Zhang 2019
      foundation
    confidence: High
  - lesson: Tiered model selection maintains cost predictability across domains
    evidence: Both native and external within expected $0.01-0.07 envelope
    confidence: High
  production_implications:
    cross_domain_cost_model:
      native_foundation: ~$0.07 (no prior results)
      external_with_partials: ~$0.04 (established theorems)
      external_open: ~$0.05-0.10 (unknown difficulty)
    scaling_projection:
      10_problems_mixed: ~$0.50
      100_problems_mixed: ~$5.00
      tier_1_budget_500: ~15-20 problems
  next_steps:
  - Run Clay Millennium candidate (external, no partials) to test upper cost bound
  - Implement automated domain classification from Haiku output
  - Build cross-domain cost predictor based on classification
  - Publish complete StegVerse methodology (native + external)
  appendix:
    api_provider: Anthropic
    models_used:
    - claude-haiku-4-5
    - claude-sonnet-4-6
    github_actions_minutes: ~12 minutes
    total_api_spend_external: 0.035
    date: '2026-05-02'
    trigger: iPhone GitHub mobile app
    repository: GCAT-BCAT-Engine/workflows
