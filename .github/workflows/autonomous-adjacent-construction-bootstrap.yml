name: Autonomous Adjacent Construction Bootstrap

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"
  push:
    branches: [main]
    paths:
      - "scripts/persist_authoritative_publisher_receipt.py"
      - "data/autonomy/authoritative-publisher-packet.json"
      - "PUBLISHER_MIRROR_HANDOFF.md"
      - ".github/workflows/autonomous-adjacent-construction-bootstrap.yml"

permissions:
  contents: write

concurrency:
  group: autonomous-adjacent-construction-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Independently validate retained authoritative packet
        run: python scripts/persist_authoritative_publisher_receipt.py
      - name: Persist Publisher-owned receipt
        run: |
          if git diff --quiet -- data/autonomy; then
            exit 0
          fi
          git config user.name "stegverse-automation"
          git config user.email "actions@users.noreply.github.com"
          git add data/autonomy
          git commit -m "chore: persist Publisher adjacent construction receipt [adjacent-target-output]"
          git push
      - uses: actions/upload-artifact@v4
        with:
          name: publisher-adjacent-construction-bootstrap
          path: data/autonomy/
          if-no-files-found: error
