name: Validate Emergency AI Cases

on:
  pull_request:
    paths:
      - 'governance/cases/**/*.case.json'
      - 'governance/schemas/emergency-ai-restriction.case.schema.json'
      - 'templates/emergency-ai-restriction.*'
      - 'tools/validate_emergency_ai_cases.py'
      - 'tools/check_emergency_ai_templates.py'
      - 'tools/check_site_mirror_dispatch.py'
      - 'tools/check_release_gate.py'
      - 'docs/site-paper-display-policy.md'
      - 'docs/site-mirror-dispatch-protocol.md'
      - 'docs/release-gate-checklist.md'
      - 'docs/verification-tracker.md'
      - 'docs/iphone-dry-run-runbook.md'
      - 'docs/verification-run-receipt.template.json'
      - 'docs/activation-status.md'
      - '.github/workflows/dispatch-site-mirror.yml'
      - '.github/workflows/validate-emergency-ai-cases.yml'
  push:
    branches:
      - main
    paths:
      - 'governance/cases/**/*.case.json'
      - 'governance/schemas/emergency-ai-restriction.case.schema.json'
      - 'templates/emergency-ai-restriction.*'
      - 'tools/validate_emergency_ai_cases.py'
      - 'tools/check_emergency_ai_templates.py'
      - 'tools/check_site_mirror_dispatch.py'
      - 'tools/check_release_gate.py'
      - 'docs/site-paper-display-policy.md'
      - 'docs/site-mirror-dispatch-protocol.md'
      - 'docs/release-gate-checklist.md'
      - 'docs/verification-tracker.md'
      - 'docs/iphone-dry-run-runbook.md'
      - 'docs/verification-run-receipt.template.json'
      - 'docs/activation-status.md'
      - '.github/workflows/dispatch-site-mirror.yml'
      - '.github/workflows/validate-emergency-ai-cases.yml'
  workflow_dispatch:

jobs:
  validate:
    name: Validate emergency AI restriction case objects and release gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validator
        run: python -m pip install --upgrade jsonschema

      - name: Check emergency AI templates
        run: python tools/check_emergency_ai_templates.py

      - name: Validate case JSON files
        run: python tools/validate_emergency_ai_cases.py

      - name: Check Site mirror dispatch configuration
        run: python tools/check_site_mirror_dispatch.py

      - name: Check Publisher to Site release gate
        run: python tools/check_release_gate.py
