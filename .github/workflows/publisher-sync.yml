name: Publisher Sync — AaCT-E Integration

on:
  schedule:
    - cron: "0 7 * * *"  # Daily at 07:00 UTC (1 hour after AaCT-E CI)
  workflow_dispatch:
    inputs:
      aacte_run_id:
        description: "Specific AaCT-E CI run ID to sync"
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Publisher
        uses: actions/checkout@v4

      - name: Download latest AaCT-E status artifact
        run: |
          # Download from AaCT-E CI artifacts
          # This requires GitHub API token with repo access
          curl -L             -H "Authorization: token ${{ secrets.AACTE_ARTIFACT_TOKEN }}"             -o last_status.json             "https://api.github.com/repos/AaCT-E/demo/actions/artifacts/..."

      - name: Ingest status to dashboard
        run: python scripts/ingest_aacte_status.py --status-file last_status.json

      - name: Evaluate milestones
        run: python scripts/social_media_scheduler.py --status-file last_status.json --dry-run

      - name: Archive traces (if tagged release)
        if: github.ref_type == 'tag'
        run: |
          python scripts/archive_traces.py             --traces-dir downloaded_traces/             --tag ${{ github.ref_name }}             --paper-version ${{ vars.CURRENT_PAPER_VERSION }}
