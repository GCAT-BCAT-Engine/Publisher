name: Validate Governed Ecosystem Awareness

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'docs/PUBLISHER_MIRROR_HANDOFF.md'
      - 'templates/sandbox-first/**'
      - 'tools/run_sandbox_validation.py'
      - 'tools/check_st017_sandbox_adoption.py'
      - '.github/workflows/validate-governed-ecosystem-awareness.yml'
      - 'docs/GOVERNED_ECOSYSTEM_SITE_MIRROR_AWARENESS.md'
      - 'tools/check_governed_ecosystem_site_mirror_awareness.py'
      - 'tools/check_publisher_activation.py'
  push:
    paths:
      - 'docs/GOVERNED_ECOSYSTEM_SITE_MIRROR_AWARENESS.md'
      - 'docs/STEGGUARDIAN_PROPAGATION_STATUS.md'
      - 'docs/PUBLISHER_GOVERNED_ECOSYSTEM_SYNC_STATUS.md'
      - 'docs/PUBLISHER_GOVERNED_ECOSYSTEM_VALIDATION_STATUS.md'
      - 'docs/PUBLISHER_GOVERNED_ECOSYSTEM_WORKFLOW_EVIDENCE_REQUEST.md'
      - 'docs/PUBLISHER_GOVERNED_ECOSYSTEM_WORKFLOW_STATUS.md'
      - 'docs/PUBLISHER_GOVERNED_ECOSYSTEM_WORKFLOW_RUNBOOK.md'
      - 'docs/PUBLISHER_MIRROR_HANDOFF.md'
      - 'templates/sandbox-first/**'
      - 'tools/run_sandbox_validation.py'
      - 'tools/check_st017_sandbox_adoption.py'
      - 'tools/check_governed_ecosystem_site_mirror_awareness.py'
      - 'tools/check_stegguardian_propagation_status.py'
      - 'tools/check_publisher_governed_ecosystem_sync_status.py'
      - 'tools/check_publisher_governed_ecosystem_validation_status.py'
      - 'tools/check_publisher_governed_ecosystem_workflow_request.py'
      - 'tools/check_publisher_activation.py'
      - '.github/workflows/validate-governed-ecosystem-awareness.yml'

jobs:
  sandbox:
    name: ST-017 isolated validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Execute Publisher sandbox
        run: python tools/run_sandbox_validation.py
      - name: Upload Publisher sandbox report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: publisher-st017-sandbox-report
          path: reports/sandbox-first-validation.report.json
          if-no-files-found: error
          retention-days: 30

  validate:
    needs: sandbox
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check Site mirror awareness
        run: python tools/check_governed_ecosystem_site_mirror_awareness.py
      - name: Check downstream pending status
        run: python tools/check_stegguardian_propagation_status.py
      - name: Check sync status
        run: python tools/check_publisher_governed_ecosystem_sync_status.py
      - name: Check validation status
        run: python tools/check_publisher_governed_ecosystem_validation_status.py
      - name: Check workflow request
        run: python tools/check_publisher_governed_ecosystem_workflow_request.py
      - name: Check Publisher activation boundary
        run: python tools/check_publisher_activation.py
