name: T-CL Route Status

on:
  push:
    paths:
      - "data/tcl-publication-route-status.json"
      - "scripts/check_tcl_publication_route_status.py"
      - ".github/workflows/tcl-route-status.yml"
  pull_request:
    paths:
      - "data/tcl-publication-route-status.json"
      - "scripts/check_tcl_publication_route_status.py"
      - ".github/workflows/tcl-route-status.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python scripts/check_tcl_publication_route_status.py
