name: Dispatch Site Paper Mirror

on:
  workflow_dispatch:
    inputs:
      site_repository:
        description: "Site repository to dispatch, owner/name"
        required: false
        default: "StegVerse-Labs/Site"
      source_ref:
        description: "Publisher ref for Site to mirror"
        required: false
        default: "main"
      dry_run:
        description: "Validate only; do not dispatch Site"
        required: false
        default: "false"
  push:
    branches:
      - main
    paths:
      - "papers/**"
      - "papers_manifest.yml"
      - "papers.json"
      - "cases/**"
      - "governance/cases/**"
      - "governance/receipts/**"
      - "docs/site-paper-display-policy.md"
      - "docs/site-mirror-dispatch-protocol.md"
      - "docs/release-gate-checklist.md"
      - "docs/validation.md"
      - "docs/verification-tracker.md"
      - "docs/iphone-dry-run-runbook.md"
      - "docs/verification-run-receipt.template.json"
      - "docs/activation-status.md"
      - "docs/PUBLISHER_MIRROR_HANDOFF.md"
      - "docs/mirror-activation-closures/**"
      - "tools/check_site_mirror_dispatch.py"
      - "tools/check_release_gate.py"
      - "tools/check_verification_receipt_template.py"
      - "tools/check_publisher_activation.py"
      - "tools/write_verification_run_receipt.py"
      - "tools/close_site_mirror_activation.py"
      - ".github/workflows/dispatch-site-mirror.yml"
      - ".github/workflows/close-site-mirror-activation.yml"
      - ".github/workflows/validate-emergency-ai-cases.yml"

jobs:
  validate-and-dispatch:
    name: Validate Publisher and dispatch Site mirror
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      DEFAULT_SITE_REPOSITORY: "StegVerse-Labs/Site"
      DEFAULT_SOURCE_REPOSITORY: "GCAT-BCAT-Engine/Publisher"
      DEFAULT_SOURCE_REF: "main"
      SITE_MIRROR_DISPATCH_TOKEN: ${{ secrets.SITE_MIRROR_DISPATCH_TOKEN }}

    steps:
      - name: Checkout Publisher
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validator dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Publisher activation validation
        run: python tools/check_publisher_activation.py

      - name: Resolve dispatch inputs
        id: dispatch
        run: |
          SITE_REPOSITORY="${{ github.event.inputs.site_repository }}"
          SOURCE_REF="${{ github.event.inputs.source_ref }}"
          DRY_RUN="${{ github.event.inputs.dry_run }}"

          if [ -z "$SITE_REPOSITORY" ]; then
            SITE_REPOSITORY="$DEFAULT_SITE_REPOSITORY"
          fi

          if [ -z "$SOURCE_REF" ]; then
            SOURCE_REF="$DEFAULT_SOURCE_REF"
          fi

          if [ -z "$DRY_RUN" ]; then
            DRY_RUN="false"
          fi

          echo "site_repository=$SITE_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "source_repository=$DEFAULT_SOURCE_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "source_ref=$SOURCE_REF" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"

          echo "Resolved Site repository: $SITE_REPOSITORY"
          echo "Resolved source repository: $DEFAULT_SOURCE_REPOSITORY"
          echo "Resolved source ref: $SOURCE_REF"
          echo "Dry run: $DRY_RUN"

      - name: Stop after validation for dry run
        if: ${{ steps.dispatch.outputs.dry_run == 'true' }}
        run: |
          echo "Dry run requested. Publisher validation and dispatch configuration checks passed."
          echo "Site mirror dispatch was not attempted."

      - name: Require dispatch token
        if: ${{ steps.dispatch.outputs.dry_run != 'true' }}
        run: |
          if [ -z "$SITE_MIRROR_DISPATCH_TOKEN" ]; then
            echo "Dispatch credential is not configured."
            echo "Publisher validation passed, but Site mirror dispatch cannot run until dispatch credentials are available."
            exit 1
          fi

      - name: Dispatch Site mirror workflow
        if: ${{ steps.dispatch.outputs.dry_run != 'true' }}
        env:
          SITE_REPOSITORY: ${{ steps.dispatch.outputs.site_repository }}
          SOURCE_REPOSITORY: ${{ steps.dispatch.outputs.source_repository }}
          SOURCE_REF: ${{ steps.dispatch.outputs.source_ref }}
        run: |
          API_URL="https://api.github.com/repos/$SITE_REPOSITORY/actions/workflows/mirror-papers.yml/dispatches"

          payload=$(python - <<'PY'
          import json
          import os
          print(json.dumps({
              "ref": "main",
              "inputs": {
                  "source_repository": os.environ["SOURCE_REPOSITORY"],
                  "source_ref": os.environ["SOURCE_REF"],
              },
          }))
          PY
          )

          status=$(curl -sS -o /tmp/site-dispatch-response.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $SITE_MIRROR_DISPATCH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$API_URL" \
            -d "$payload")

          if [ "$status" != "204" ]; then
            echo "Site mirror dispatch failed with HTTP status $status"
            cat /tmp/site-dispatch-response.json
            exit 1
          fi

          echo "Dispatched Site mirror workflow."
          echo "Site repository: $SITE_REPOSITORY"
          echo "Source repository: $SOURCE_REPOSITORY"
          echo "Source ref: $SOURCE_REF"

      - name: Write verification receipt
        if: ${{ success() && steps.dispatch.outcome == 'success' }}
        env:
          DRY_RUN: ${{ steps.dispatch.outputs.dry_run }}
          SITE_REPOSITORY: ${{ steps.dispatch.outputs.site_repository }}
          SOURCE_REPOSITORY: ${{ steps.dispatch.outputs.source_repository }}
          SOURCE_REF: ${{ steps.dispatch.outputs.source_ref }}
          SITE_DISPATCH_ATTEMPTED: ${{ steps.dispatch.outputs.dry_run != 'true' }}
          SITE_DISPATCH_STATUS: ${{ steps.dispatch.outputs.dry_run == 'true' && 'not_attempted_for_dry_run' || 'dispatch_request_accepted' }}
          RECEIPT_STATUS: ${{ job.status }}
          RECEIPT_OUTPUT_DIR: verification-runs
        run: python tools/write_verification_run_receipt.py

      - name: Upload verification receipt
        if: ${{ success() && steps.dispatch.outcome == 'success' }}
        uses: actions/upload-artifact@v4
        with:
          name: publisher-site-verification-receipt-${{ github.run_id }}-${{ github.run_attempt }}
          path: verification-runs/*.json
          if-no-files-found: error
