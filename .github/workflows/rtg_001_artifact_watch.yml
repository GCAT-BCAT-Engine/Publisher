name: "RTG-001 Artifact Watch"

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watch_rtg_001:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout Publisher
        uses: actions/checkout@v4

      - name: Validate retained adjacent-construction packet
        run: python scripts/consume_authoritative_adjacent_packet.py

      - name: Poll workflows repo for RTG-001 artifact status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p status/rtg
          python - <<'PY'
          import json, os, time, urllib.request

          owner = "GCAT-BCAT-Engine"
          repo = "workflows"
          headers = {
              "Accept": "application/vnd.github+json",
              "User-Agent": "rtg-001-artifact-watch"
          }
          token = os.environ.get("GH_TOKEN")
          if token:
              headers["Authorization"] = f"Bearer {token}"

          def get_json(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.loads(r.read().decode("utf-8"))

          result = {
              "schema_version": "1.0",
              "case_id": "RTG-001",
              "watched_repo": f"{owner}/{repo}",
              "generated_unix": time.time(),
              "artifact_returned": False,
              "matched_run": None,
              "artifacts": [],
              "claim_boundary": {
                  "artifact_returned": False,
                  "artifact_ingested": False,
                  "rtg_state_updated": False,
                  "autonomous_theorem_proving_claimed": False,
                  "final_correctness_claimed": False
              }
          }

          try:
              runs = get_json(f"https://api.github.com/repos/{owner}/{repo}/actions/runs?per_page=20")
              for run in runs.get("workflow_runs", []):
                  run_id = run.get("id")
                  arts = get_json(f"https://api.github.com/repos/{owner}/{repo}/actions/runs/{run_id}/artifacts?per_page=50")
                  artifacts = arts.get("artifacts", [])
                  names = [a.get("name") for a in artifacts]
                  if "external-full-results" in names or "rtg-001-auto-dispatch-receipt" in names:
                      result["matched_run"] = {
                          "id": run_id,
                          "name": run.get("name"),
                          "status": run.get("status"),
                          "conclusion": run.get("conclusion"),
                          "html_url": run.get("html_url")
                      }
                      result["artifacts"] = [
                          {
                              "id": a.get("id"),
                              "name": a.get("name"),
                              "expired": a.get("expired"),
                              "size_in_bytes": a.get("size_in_bytes")
                          }
                          for a in artifacts
                      ]
                      result["artifact_returned"] = "external-full-results" in names
                      result["claim_boundary"]["artifact_returned"] = result["artifact_returned"]
                      break
          except Exception as exc:
              result["poll_error"] = str(exc)

          with open("status/rtg/rtg_001_artifact_watch_status.json", "w", encoding="utf-8") as f:
              json.dump(result, f, indent=2)

          md = [
              "# RTG-001 Artifact Watch Status",
              "",
              f"Generated unix: `{result['generated_unix']}`",
              "",
              f"Artifact returned: `{result['artifact_returned']}`",
              "",
              "## Matched Run",
              "",
              "```json",
              json.dumps(result.get("matched_run"), indent=2),
              "```",
              "",
              "## Artifacts",
              "",
              "```json",
              json.dumps(result.get("artifacts"), indent=2),
              "```",
              "",
              "## Claim Boundary",
              "",
              "```json",
              json.dumps(result.get("claim_boundary"), indent=2),
              "```",
          ]
          with open("docs/rtg/RTG_001_ARTIFACT_WATCH_STATUS.md", "w", encoding="utf-8") as f:
              f.write("\n".join(md) + "\n")
          PY

      - name: Commit watch status and autonomy receipt if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add status/rtg/rtg_001_artifact_watch_status.json docs/rtg/RTG_001_ARTIFACT_WATCH_STATUS.md data/autonomy/adjacent-construction-receipt.json data/autonomy/adjacent-construction-status.json
          git diff --cached --quiet || git commit -m "Update RTG-001 status and Publisher autonomy receipt"
          git push
